# https://mangowm.github.io/docs/configuration/input

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us,ru
xkb_rules_options=grp:caps_toggle

# touchpad
disable_trackpad=0
tap_to_click=0
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
click_method=2
disable_while_typing=1
left_handed=0
trackpad_accel_profile=2
trackpad_accel_speed=-0.2
middle_button_emulation=0
swipe_min_threshold=1

# mouse
mouse_natural_scrolling=0